<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Fitness — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f0f;
      color: #f0ede8;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
    }

    .container { max-width: 760px; margin: 0 auto; }

    /* Header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-circle {
      width: 40px; height: 40px;
      background: #FC4C02;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    .club-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: #f0ede8;
    }
    .updated {
      font-size: 12px;
      color: #666;
    }

    /* Hero */
    .hero { margin-bottom: 2rem; }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      color: #f0ede8;
      line-height: 1.05;
      margin-bottom: 0.4rem;
    }
    .hero p { font-size: 14px; color: #888; }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .pill-group { display: flex; gap: 4px; background: #1a1a1a; border-radius: 10px; padding: 4px; }
    .pill {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .pill.active { background: #FC4C02; color: white; }
    .pill:hover:not(.active) { color: #f0ede8; }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 1rem;
      border: 0.5px solid #2a2a2a;
    }
    .summary-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .summary-value { font-size: 1.4rem; font-weight: 500; color: #f0ede8; }
    .summary-unit { font-size: 12px; color: #555; font-weight: 400; }

    /* Metric tabs */
    .metric-tabs { display: flex; gap: 4px; background: #1a1a1a; border-radius: 10px; padding: 4px; margin-bottom: 1.25rem; width: fit-content; }

    /* Leaderboard */
    .board { display: flex; flex-direction: column; gap: 8px; }

    .entry {
      background: #1a1a1a;
      border: 0.5px solid #2a2a2a;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
      animation: fadeUp 0.4s ease both;
    }
    .entry:hover { border-color: #3a3a3a; }
    .entry.first { border-color: #FC4C02; background: #1a0e09; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rank {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: #333;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .entry.first .rank { color: #FC4C02; }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      font-weight: 500;
      flex-shrink: 0;
      background: #2a2a2a;
      color: #888;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar.c1 { background: #2a1508; color: #FC4C02; }
    .avatar.c2 { background: #0d1e2a; color: #4a9fd4; }
    .avatar.c3 { background: #0d2a1a; color: #4ac47a; }
    .avatar.c4 { background: #2a2a0d; color: #c4b84a; }
    .avatar.c5 { background: #1f0d2a; color: #a44ac4; }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 15px; font-weight: 500; color: #f0ede8; }
    .member-sub { font-size: 12px; color: #555; margin-top: 2px; }

    .bar-wrap { flex: 1; min-width: 0; }
    .bar-track {
      height: 6px;
      background: #252525;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #FC4C02;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }
    .entry:not(.first) .bar-fill { background: #3a3a3a; }
    .bar-label { font-size: 12px; color: #555; }

    .main-stat { text-align: right; flex-shrink: 0; min-width: 70px; }
    .main-stat-val { font-size: 1.2rem; font-weight: 500; color: #f0ede8; }
    .main-stat-unit { font-size: 12px; color: #555; }

    /* Pending members */
    .pending-section { margin-top: 2.5rem; }
    .pending-title {
      font-size: 11px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pending-title::after { content: ''; flex: 1; height: 0.5px; background: #2a2a2a; }
    .pending-entry {
      background: #141414;
      border: 0.5px dashed #2a2a2a;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      opacity: 0.6;
    }
    .pending-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px dashed #333;
      display: flex; align-items: center; justify-content: center;
      color: #333;
      font-size: 18px;
      flex-shrink: 0;
    }
    .pending-name { font-size: 14px; color: #444; }
    .pending-hint { font-size: 12px; color: #333; margin-top: 2px; }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skeleton {
      background: #1a1a1a;
      border: 0.5px solid #2a2a2a;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      height: 74px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 0.5px solid #FC4C02;
      color: #f0ede8;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      animation: slideUp 0.3s ease;
      z-index: 100;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Footer */
    .footer { margin-top: 3rem; text-align: center; font-size: 12px; color: #333; }
    .footer a { color: #FC4C02; text-decoration: none; }

    @media (max-width: 500px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 2.2rem; }
      .bar-wrap { display: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="logo-row">
      <div class="logo-circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M13.5 5.5L17 12H14L17.5 18.5H10.5L14 12H11L13.5 5.5Z" fill="white"/>
        </svg>
      </div>
      <span class="club-name">Future Fitness</span>
    </div>
    <span class="updated" id="updated-time">Loading…</span>
  </div>

  <div class="hero">
    <h1>Leaderboard</h1>
    <p id="period-desc">Loading members…</p>
  </div>

  <!-- Period switcher -->
  <div class="controls">
    <div class="pill-group" id="period-group">
      <button class="pill" onclick="setPeriod('week', event)">This week</button>
      <button class="pill" onclick="setPeriod('month', event)">This month</button>
      <button class="pill active" onclick="setPeriod('all', event)">All time</button>
    </div>
  </div>

  <!-- Summary totals -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">Total distance</div>
      <div class="summary-value" id="total-dist">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Activities</div>
      <div class="summary-value" id="total-acts">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Elevation</div>
      <div class="summary-value" id="total-elev">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Moving time</div>
      <div class="summary-value" id="total-time">—</div>
    </div>
  </div>

  <!-- Metric switcher -->
  <div class="metric-tabs" id="metric-group">
    <button class="pill active" onclick="setMetric('distance', event)">Distance</button>
    <button class="pill" onclick="setMetric('elevation', event)">Elevation</button>
    <button class="pill" onclick="setMetric('activities', event)">Activities</button>
    <button class="pill" onclick="setMetric('time', event)">Time</button>
  </div>

  <!-- Leaderboard -->
  <div class="board" id="board">
    <div class="loading">
      <div class="skeleton"></div>
      <div class="skeleton" style="animation-delay:0.2s"></div>
      <div class="skeleton" style="animation-delay:0.4s"></div>
    </div>
  </div>

  <!-- Pending members -->
  <div class="pending-section">
    <div class="pending-title">Waiting to connect</div>
    <div class="pending-entry">
      <div class="pending-avatar">+</div>
      <div>
        <div class="pending-name">Invite your club members</div>
        <div class="pending-hint">Share your Future Fitness page so they can connect with Strava</div>
      </div>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://www.strava.com" target="_blank">Strava</a> · Future Fitness Club
  </div>

</div>

<script>
const COLOR_CLASSES = ['c1', 'c2', 'c3', 'c4', 'c5'];

function getInitials(name) {
  return name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

let MEMBERS = [];
let currentPeriod = 'all';
let currentMetric = 'distance';

// ── Data loading ─────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('/api/leaderboard');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();

    MEMBERS = raw.map((m, i) => ({
      athlete_id: m.athlete_id,
      name: m.name,
      profile_photo: m.profile_photo,
      initials: getInitials(m.name),
      colorClass: COLOR_CLASSES[i % COLOR_CLASSES.length],
      activities: (m.activities || []).map(a => ({
        date: a.date,
        distance_m: a.distance_m,
        moving_time_s: a.moving_time_s,
        elevation_m: a.elevation_m,
        type: a.type,
      })),
    }));

    render();
  } catch (err) {
    console.error('Failed to load leaderboard:', err);
    document.getElementById('board').innerHTML =
      '<div style="color:#555;font-size:14px;padding:1rem 0">Failed to load data. Please refresh.</div>';
  }
}

// ── Utility ──────────────────────────────────────────────────

function getDateRange(period) {
  const now = new Date();
  if (period === 'week') {
    const start = new Date(now);
    start.setDate(now.getDate() - now.getDay());
    start.setHours(0, 0, 0, 0);
    return start;
  }
  if (period === 'month') {
    return new Date(now.getFullYear(), now.getMonth(), 1);
  }
  return new Date('2000-01-01');
}

function filterActivities(activities, period) {
  const cutoff = getDateRange(period);
  return activities.filter(a => new Date(a.date) >= cutoff);
}

function computeStats(activities) {
  return {
    distance_km: activities.reduce((s, a) => s + a.distance_m, 0) / 1000,
    elevation_m: activities.reduce((s, a) => s + a.elevation_m, 0),
    moving_time_s: activities.reduce((s, a) => s + a.moving_time_s, 0),
    count: activities.length,
  };
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h === 0) return m + 'm';
  return h + 'h ' + m + 'm';
}

function getMetricValue(stats, metric) {
  if (metric === 'distance')   return { val: stats.distance_km.toFixed(1), unit: 'km' };
  if (metric === 'elevation')  return { val: Math.round(stats.elevation_m).toLocaleString(), unit: 'm' };
  if (metric === 'activities') return { val: stats.count, unit: 'acts' };
  if (metric === 'time')       return { val: formatTime(stats.moving_time_s), unit: '' };
}

function getRawMetric(stats, metric) {
  if (metric === 'distance')   return stats.distance_km;
  if (metric === 'elevation')  return stats.elevation_m;
  if (metric === 'activities') return stats.count;
  if (metric === 'time')       return stats.moving_time_s;
}

// ── Render ───────────────────────────────────────────────────

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const ranked = MEMBERS.map(m => {
    const acts = filterActivities(m.activities, currentPeriod);
    const stats = computeStats(acts);
    return { ...m, stats };
  }).sort((a, b) => getRawMetric(b.stats, currentMetric) - getRawMetric(a.stats, currentMetric));

  const fallback = { distance_km: 1, elevation_m: 1, count: 1, moving_time_s: 1 };
  const maxVal = getRawMetric(ranked[0]?.stats || fallback, currentMetric) || 1;

  const totDist = ranked.reduce((s, m) => s + m.stats.distance_km, 0);
  const totElev = ranked.reduce((s, m) => s + m.stats.elevation_m, 0);
  const totTime = ranked.reduce((s, m) => s + m.stats.moving_time_s, 0);
  const totActs = ranked.reduce((s, m) => s + m.stats.count, 0);

  document.getElementById('total-dist').innerHTML = totDist.toFixed(1) + ' <span style="font-size:13px;color:#555">km</span>';
  document.getElementById('total-elev').innerHTML = Math.round(totElev).toLocaleString() + ' <span style="font-size:13px;color:#555">m</span>';
  document.getElementById('total-time').textContent = formatTime(totTime);
  document.getElementById('total-acts').textContent = totActs;

  const count = MEMBERS.length;
  const periodLabels = { week: 'this week', month: 'this month', all: 'all time' };
  document.getElementById('period-desc').innerHTML =
    'Showing ' + periodLabels[currentPeriod] + ' · ' + count + ' member' + (count !== 1 ? 's' : '') + ' connected';

  document.getElementById('updated-time').textContent =
    'Updated ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

  ranked.forEach((m, i) => {
    const mv = getMetricValue(m.stats, currentMetric);
    const barPct = Math.max(4, (getRawMetric(m.stats, currentMetric) / maxVal) * 100);

    const avatarContent = m.profile_photo
      ? `<img src="${m.profile_photo}" alt="${m.name}" />`
      : m.initials;

    const entry = document.createElement('div');
    entry.className = 'entry' + (i === 0 ? ' first' : '');
    entry.style.animationDelay = (i * 60) + 'ms';
    entry.innerHTML = `
      <div class="rank">${i + 1}</div>
      <div class="avatar ${m.colorClass}">${avatarContent}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-sub">${m.stats.count} activit${m.stats.count === 1 ? 'y' : 'ies'} · ${formatTime(m.stats.moving_time_s)}</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${barPct}%"></div></div>
        <div class="bar-label">${m.stats.distance_km.toFixed(1)} km · ${Math.round(m.stats.elevation_m)} m elev</div>
      </div>
      <div class="main-stat">
        <div class="main-stat-val">${mv.val}</div>
        <div class="main-stat-unit">${mv.unit}</div>
      </div>
    `;
    board.appendChild(entry);
  });

  if (ranked.length === 0) {
    board.innerHTML = '<div style="color:#555;font-size:14px;padding:1rem 0">No activities for this period yet.</div>';
  }
}

function setPeriod(p, e) {
  currentPeriod = p;
  document.querySelectorAll('#period-group .pill').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render();
}

function setMetric(m, e) {
  currentMetric = m;
  document.querySelectorAll('#metric-group .pill').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render();
}

// ── Init ─────────────────────────────────────────────────────

// Show toast if member just joined
const params = new URLSearchParams(window.location.search);
if (params.get('joined') === '1') {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = "You're on the leaderboard!";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
  history.replaceState({}, '', '/leaderboard.html');
}

loadData();
</script>
</body>
</html>
